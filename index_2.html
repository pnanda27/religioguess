<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReligioGuessr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0c111a;
      color: #dde4ee;
      height: 100vh;
      overflow: hidden;
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* The image — always block, always filling the screen */
    #game-image {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Dark overlay when result is showing */
    #game-image.dimmed {
      filter: brightness(0.25);
    }

    /* Error text when image fails */
    #img-error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #6a80a0;
      font-size: 0.85rem;
      z-index: 5;
    }

    /* Top HUD */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }
    #hud-title {
      font-size: 1.1rem;
      color: #d4943a;
      font-weight: bold;
      letter-spacing: 2px;
    }
    #hud-right {
      display: flex;
      gap: 10px;
    }
    .pill {
      background: rgba(10,15,24,0.8);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
    }
    .pill b { color: #d4943a; }

    /* Question label */
    #question {
      position: absolute;
      bottom: 78px;
      left: 0; right: 0;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,1);
      z-index: 10;
      pointer-events: none;
    }

    /* Four answer buttons */
    #choices {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      z-index: 10;
    }
    .choice {
      padding: 18px 12px;
      background: rgba(10,15,24,0.88);
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.07);
      color: #dde4ee;
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    .choice:hover:not(:disabled) {
      background: rgba(212,148,58,0.25);
      color: #f0b85a;
    }
    .choice .ltr {
      display: block;
      font-size: 0.6rem;
      color: #6a80a0;
      margin-bottom: 3px;
      letter-spacing: 1px;
    }
    .choice.correct { background: rgba(40,140,80,0.5) !important; color: #7de8ac !important; }
    .choice.wrong   { background: rgba(180,50,50,0.5) !important; color: #f09090 !important; }
    .choice.faded   { opacity: 0.35; }
    .choice:disabled { cursor: default; }

    /* ── RESULT PANEL ── */
    #result-panel {
      display: none;
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 42%;
      min-width: 300px;
      background: #141e2d;
      border-right: 1px solid rgba(255,255,255,0.08);
      z-index: 20;
      flex-direction: column;
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    #result-panel.open { display: flex; }

    #result-thumb {
      width: 100%;
      height: 190px;
      object-fit: cover;
      flex-shrink: 0;
    }
    #result-verdict {
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #verdict-line {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 3px;
    }
    #verdict-line.correct { color: #7de8ac; }
    #verdict-line.wrong   { color: #f09090; }
    #verdict-rel  { font-size: 0.85rem; color: #d4943a; }

    #result-score {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.8rem;
      color: #6a80a0;
      flex-shrink: 0;
    }
    #result-score b { color: #d4943a; }

    #result-loc {
      padding: 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.8rem;
      color: #dde4ee;
      flex-shrink: 0;
    }

    #result-blurbs {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .blurb {
      background: #1c2a3e;
      border-radius: 8px;
      padding: 12px 13px;
    }
    .blurb-title {
      font-size: 0.62rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #d4943a;
      margin-bottom: 6px;
    }
    .blurb-text {
      font-size: 0.78rem;
      line-height: 1.7;
      color: #6a80a0;
    }

    #result-footer {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #btn-next {
      width: 100%;
      background: #d4943a;
      color: #0c111a;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.9rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #btn-next:hover { background: #f0b85a; }

    /* ── FINAL SCREEN ── */
    #final-screen {
      display: none;
      position: absolute;
      inset: 0;
      background: #0c111a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 30;
      overflow-y: auto;
      padding: 30px 20px;
    }
    #final-screen.open { display: flex; }

    #final-title {
      font-size: 1.8rem;
      color: #d4943a;
      letter-spacing: 3px;
      font-weight: bold;
    }
    #final-ring {
      width: 150px; height: 150px;
      border-radius: 50%;
      border: 3px solid #d4943a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 8px rgba(212,148,58,0.15), 0 0 40px rgba(212,148,58,0.2);
    }
    #final-num   { font-size: 2.5rem; font-weight: bold; color: #d4943a; }
    #final-denom { font-size: 0.75rem; color: #6a80a0; }
    #final-grade { font-size: 1.2rem; font-weight: bold; color: #dde4ee; }

    #final-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 800px;
    }
    .final-card {
      background: #141e2d;
      border-radius: 7px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
    }
    .final-card span { color: #dde4ee; }

    #btn-again {
      background: #d4943a;
      color: #0c111a;
      border: none;
      border-radius: 25px;
      padding: 12px 40px;
      font-size: 0.9rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }
    #btn-again:hover { background: #f0b85a; }
  </style>
</head>
<body>

<!-- GAME SCREEN -->
<div id="game-screen">

  <img id="game-image" src="" alt="">
  <div id="img-error">Image could not be loaded.<br><span id="img-error-path" style="font-size:0.7rem"></span></div>

  <div id="hud">
    <div id="hud-title">ReligioGuessr</div>
    <div id="hud-right">
      <div class="pill">Round <b id="h-round">1</b> / <b id="h-total">5</b></div>
      <div class="pill"><b id="h-score">0</b> correct</div>
    </div>
  </div>

  <div id="question">Which religion does this image belong to?</div>

  <div id="choices">
    <button class="choice" id="c0" onclick="guess(0)"><span class="ltr">A</span><span id="l0"></span></button>
    <button class="choice" id="c1" onclick="guess(1)"><span class="ltr">B</span><span id="l1"></span></button>
    <button class="choice" id="c2" onclick="guess(2)"><span class="ltr">C</span><span id="l2"></span></button>
    <button class="choice" id="c3" onclick="guess(3)"><span class="ltr">D</span><span id="l3"></span></button>
  </div>
</div>

<!-- RESULT PANEL -->
<div id="result-panel">
  <img id="result-thumb" src="" alt="" onerror="this.style.display='none'">

  <div id="result-verdict">
    <div id="verdict-line"></div>
    <div id="verdict-rel"></div>
  </div>

  <div id="result-score" id="result-score"></div>

  <div id="result-loc">📍 <span id="result-loc-txt"></span></div>

  <div id="result-blurbs">
    <div class="blurb">
      <div class="blurb-title">About This Image</div>
      <div class="blurb-text" id="blurb-img"></div>
    </div>
    <div class="blurb">
      <div class="blurb-title">Geography &amp; Religion</div>
      <div class="blurb-text" id="blurb-rel"></div>
    </div>
  </div>

  <div id="result-footer">
    <button id="btn-next" onclick="nextRound()">NEXT ROUND →</button>
  </div>
</div>

<!-- FINAL SCREEN -->
<div id="final-screen">
  <div id="final-title">FINAL RESULTS</div>
  <div id="final-ring">
    <div id="final-num">0</div>
    <div id="final-denom">/ 0 correct</div>
  </div>
  <div id="final-grade"></div>
  <div id="final-grid"></div>
  <button id="btn-again" onclick="restart()">PLAY AGAIN</button>
</div>

<script>
// ── RELIGION DATA ──────────────────────────────────────────────

  {
    id:"hinduism", name:"Hinduism", color:"#e06820",
    blurb:"Hinduism is one of the world's oldest religions, originating in the Indus Valley over 4,000 years ago. It is a diverse tradition encompassing a vast array of deities, rituals, philosophies, and texts, with no single founder or central authority. The geography of the Indian subcontinent shaped Hinduism profoundly: sacred rivers like the Ganges are worshipped as goddesses, the Himalayas are considered the abode of the gods, and the monsoon cycle drove the agricultural festivals that became central to Hindu worship. The relative isolation of the subcontinent allowed this tradition to develop its enormous internal diversity over millennia.",
    images:[

    images:[
      { src:"images/buddhism/1.jpg", location:"Yangon, Myanmar",

      { src:"images/buddhism/2.jpg", location:"Thorong La Pass, Nepal/Tibet region",
        imageBlurb:"The extreme altitude of the Tibetan plateau, which isolated communities from the outside world for centuries, allowed a unique form of Buddhism called Vajrayana to develop in which mountain passes, winds, and sky were incorporated as sacred channels for prayer." },
      { src:"images/buddhism/3.jpg", location:"Leshan, Sichuan, China",

  },
  {
    id:"islam", name:"Islam", color:"#2a9d5c",
    blurb:"Islam was founded in the Arabian Peninsula in the 7th century CE by the Prophet Muhammad. It is the world's second-largest religion, centered on submission to Allah and guided by the Quran and the Hadith. The desert geography of Arabia shaped Islam's core values: hospitality, community solidarity, and equality before God reflect the survival demands of arid environments. The trade winds of the Indian Ocean and overland caravan routes carried Islam across Africa, Persia, South Asia, and Southeast Asia, where it adapted to local cultures while maintaining a unified global identity centered on Mecca.",
    images:[
      { src:"images/islam/1.jpg", location:"Temple Mount, Jerusalem, Israel",

      { src:"images/islam/3.jpg", location:"Granada, Andalusia, Spain",

    images:[

      { src:"images/christianity/2.jpg", location:"Qasr el Yahud, Jordan River, West Bank",

// ── STATE ──────────────────────────────────────────────────────
const TOTAL_ROUNDS = 5;
let rounds = [], idx = 0, score = 0, results = [], answered = false;

// ── HELPERS ────────────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ── BUILD ROUNDS ───────────────────────────────────────────────
function buildRounds() {
  let pool = [];
  RELIGIONS.forEach(r => r.images.forEach(img => pool.push({ rel: r, img })));
  pool = shuffle(pool).slice(0, TOTAL_ROUNDS);
  return pool.map(({ rel, img }) => {
    const others  = shuffle(RELIGIONS.filter(r => r.id !== rel.id)).slice(0, 3);
    const choices = shuffle([rel, ...others]);
    return { rel, img, choices };
  });
}

// ── START ──────────────────────────────────────────────────────
function start() {
  rounds   = buildRounds();
  idx      = 0;
  score    = 0;
  results  = [];
  document.getElementById('final-screen').classList.remove('open');
  loadRound(0);
}

// ── LOAD ROUND ─────────────────────────────────────────────────
function loadRound(i) {
  answered = false;
  const { rel, img, choices } = rounds[i];

  // HUD
  document.getElementById('h-round').textContent = i + 1;
  document.getElementById('h-total').textContent = TOTAL_ROUNDS;
  document.getElementById('h-score').textContent = score;

  // Image — just set src directly, no display tricks
  const el    = document.getElementById('game-image');
  const errEl = document.getElementById('img-error');
  el.classList.remove('dimmed');
  errEl.style.display = 'none';

  el.onerror = function() {
    document.getElementById('img-error-path').textContent = img.src;
    errEl.style.display = 'block';
  };
  el.src = img.src;

  // Choices
  [0,1,2,3].forEach(n => {
    const btn = document.getElementById('c' + n);
    btn.className = 'choice';
    btn.disabled  = false;
    btn.onclick   = () => guess(n);
    document.getElementById('l' + n).textContent = choices[n].name;
  });

  // Close result panel
  document.getElementById('result-panel').classList.remove('open');
}

// ── GUESS ──────────────────────────────────────────────────────
function guess(n) {
  if (answered) return;
  answered = true;

  const { rel, img, choices } = rounds[idx];
  const correct = choices[n].id === rel.id;
  if (correct) score++;
  results.push({ name: rel.name, correct });

  // Colour buttons
  [0,1,2,3].forEach(i => {
    const btn = document.getElementById('c' + i);
    btn.disabled = true;
    if (choices[i].id === rel.id) btn.classList.add('correct');
    else if (i === n)             btn.classList.add('wrong');
    else                          btn.classList.add('faded');
  });

  // Dim image
  document.getElementById('game-image').classList.add('dimmed');

  // Show result panel
  const done = idx >= TOTAL_ROUNDS - 1;
  document.getElementById('verdict-line').textContent  = correct ? '✓  Correct!' : '✗  Wrong';
  document.getElementById('verdict-line').className    = correct ? 'correct' : 'wrong';
  document.getElementById('verdict-rel').textContent   = rel.name;
  document.getElementById('result-score').innerHTML    =
    `Score: <b>${score}</b> / ${idx + 1} correct &nbsp;·&nbsp; ${Math.round(score/(idx+1)*100)}%`;
  document.getElementById('result-loc-txt').textContent = img.location;
  document.getElementById('blurb-img').textContent      = img.imageBlurb;
  document.getElementById('blurb-rel').textContent      = rel.blurb;
  document.getElementById('result-thumb').src           = img.src;
  document.getElementById('btn-next').textContent       = done ? 'SEE RESULTS →' : 'NEXT ROUND →';
  document.getElementById('result-panel').classList.add('open');
}

// ── NEXT ROUND ─────────────────────────────────────────────────
function nextRound() {
  idx++;
  if (idx >= TOTAL_ROUNDS) {
    showFinal();
  } else {
    document.getElementById('result-panel').classList.remove('open');
    loadRound(idx);
  }
}

// ── FINAL ──────────────────────────────────────────────────────
function showFinal() {
  document.getElementById('final-num').textContent   = score;
  document.getElementById('final-denom').textContent = `/ ${TOTAL_ROUNDS} correct`;
  const pct = score / TOTAL_ROUNDS;
  document.getElementById('final-grade').textContent =
    pct === 1  ? '🏆 Perfect!'          :
    pct >= 0.8 ? '🌟 Religion Expert'   :
    pct >= 0.6 ? '📖 Strong Knowledge'  :
    pct >= 0.4 ? '🌍 Getting There'     : '🔍 Keep Exploring';

  const grid = document.getElementById('final-grid');
  grid.innerHTML = '';
  results.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'final-card';
    d.innerHTML = `<span>${r.correct ? '✅' : '❌'}</span><span>Round ${i+1}: ${r.name}</span>`;
    grid.appendChild(d);
  });

  document.getElementById('result-panel').classList.remove('open');
  document.getElementById('final-screen').classList.add('open');
}

function restart() { start(); }

// ── START IMMEDIATELY ──────────────────────────────────────────
start();
</script>
